name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.7.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Validate inputs
        env:
          VERSION: ${{ inputs.version }}
          REF: ${{ github.ref }}
        run: |
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '${VERSION}'. Expected X.Y.Z"
            exit 1
          fi
          if [[ "${REF}" != "refs/heads/main" ]]; then
            echo "::error::Release must be dispatched from main (got ${REF})"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight — release and tag must not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Release v${VERSION} already exists. Delete it before re-running."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists on remote. Delete it before re-running."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Bump versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -x

          # package.json
          npm pkg set "version=${VERSION}"

          # src-tauri/Cargo.toml (only the [package] version, first occurrence)
          awk -v ver="${VERSION}" 'done != 1 && /^version = "[0-9]+\.[0-9]+\.[0-9]+"/ { print "version = \"" ver "\""; done=1; next } { print }' \
            src-tauri/Cargo.toml > src-tauri/Cargo.toml.tmp && mv src-tauri/Cargo.toml.tmp src-tauri/Cargo.toml

          # cli/Cargo.toml (only the [package] version, first occurrence)
          awk -v ver="${VERSION}" 'done != 1 && /^version = "[0-9]+\.[0-9]+\.[0-9]+"/ { print "version = \"" ver "\""; done=1; next } { print }' \
            cli/Cargo.toml > cli/Cargo.toml.tmp && mv cli/Cargo.toml.tmp cli/Cargo.toml

          # src-tauri/tauri.conf.json
          jq --arg v "${VERSION}" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp \
            && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          # install.sh
          sed -i '' "s/SPACEBAR_VERSION:-[0-9]*\.[0-9]*\.[0-9]*/SPACEBAR_VERSION:-${VERSION}/" install.sh

          # Update Cargo.lock
          cargo update --workspace

          echo "=== Changes after bump ==="
          git diff --stat

      - name: Commit and tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml cli/Cargo.toml src-tauri/tauri.conf.json install.sh Cargo.lock
          if git diff --cached --quiet; then
            echo "Version already at ${VERSION}, skipping commit"
          else
            git commit -m "chore: bump version to ${VERSION}"
          fi
          git push origin main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Build CLI
        run: cargo build --release -p spacebar

      - name: Package tarball
        run: |
          STAGING_DIR="$(mktemp -d)"
          cp -R target/release/bundle/macos/Spacebar.app "$STAGING_DIR/"
          cp target/release/spacebar "$STAGING_DIR/"
          tar -czf Spacebar_aarch64.tar.gz -C "$STAGING_DIR" Spacebar.app spacebar
          rm -rf "$STAGING_DIR"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            Spacebar_aarch64.tar.gz
